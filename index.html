<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Investment Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

.container {
    max-width: 450px;
    margin: 60px auto;
    padding: 20px;
    background: #1e293b;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,0,0,0.4);
}

h1 {
    text-align: center;
    color: #38bdf8;
    margin-bottom: 20px;
}

.balance {
    text-align: center;
    font-size: 26px;
    font-weight: bold;
    margin: 20px 0;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

.deposit {
    background: #22c55e;
    color: white;
}

.withdraw {
    background: #ef4444;
    color: white;
}
</style>
</head>

<body>

<div class="container">
    <h1>Investment Dashboard</h1>

    <div class="balance">
        Balance: $<span id="balance">0</span>
    </div>

    <input type="number" id="amount" placeholder="Enter amount">

    <button class="deposit" onclick="deposit()">Deposit</button>
    <button class="withdraw" onclick="withdraw()">Withdraw</button>
</div>

<script>
let balance = 0;

function updateBalance() {
    document.getElementById("balance").innerText = balance;
}

function deposit() {
    let amount = Number(document.getElementById("amount").value);
    if (amount > 0) {
        balance += amount;
        updateBalance();
    } else {
        alert("Enter a valid amount");
    }
}

function withdraw() {
    let amount = Number(document.getElementById("amount").value);
    if (amount > 0 && amount <= balance) {
        balance -= amount;
        updateBalance();
    } else {
        alert("Invalid or insufficient balance");
    }
}

updateBalance();
</script>

</body>
</html>
