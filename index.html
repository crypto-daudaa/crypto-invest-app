<!DOCTYPE html>
<html>
<head>
  <title>Investment Platform</title>
</head>

<body style="font-family:Arial; background:#0f172a; color:white; text-align:center; padding:20px;">

<!-- LOGIN PAGE -->
<div id="loginPage">
  <h1 style="color:#22c55e;">Welcome Back</h1>

  <input id="user" placeholder="Username" style="padding:10px; width:200px;"><br><br>
  <input id="pass" type="password" placeholder="Password" style="padding:10px; width:200px;"><br><br>

  <button onclick="login()" style="padding:10px 20px; background:green; color:white;">
    Login
  </button>

  <p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

  <h1 style="color:#22c55e;">Investment Dashboard</h1>

  <h2>Balance: <span id="balance"></span></h2>

  <button onclick="deposit()" style="padding:10px; background:green; color:white;">Deposit 100</button>
  <button onclick="withdraw()" style="padding:10px; background:red; color:white;">Withdraw 100</button>

  <hr>

  <h2>Investment Plans</h2>

  <div style="background:#1e293b; padding:10px; margin:10px;">
    Basic Plan - 10% Profit
  </div>

  <div style="background:#1e293b; padding:10px; margin:10px;">
    VIP Plan - 20% Profit
  </div>

  <div style="background:#1e293b; padding:10px; margin:10px;">
    Pro Plan - 30% Profit
  </div>

  <hr>

  <h2>Profit Calculator</h2>

  <input id="amount" type="number" placeholder="Enter amount" style="padding:10px;">
  <br><br>

  <button onclick="calc()" style="padding:10px 20px; background:#22c55e; color:white;">
    Calculate
  </button>

  <h3 id="result"></h3>

  <br>

  <button onclick="logout()" style="background:red; padding:10px; color:white;">
    Logout
  </button>

</div>

<script>
  // AUTO LOGIN CHECK
  if (localStorage.getItem("loggedIn") === "true") {
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  }

  // BALANCE
  let balance = localStorage.getItem("balance");
  if (!balance) balance = 1000;
  else balance = Number(balance);

  function showBalance() {
    document.getElementById("balance").innerText = balance;
    localStorage.setItem("balance", balance);
  }

  showBalance();

  // LOGIN
  function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if (u === "admin" && p === "1234") {
      localStorage.setItem("loggedIn", "true");
      document.getElementById("loginPage").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
    } else {
      document.getElementById("msg").innerText = "Wrong login details";
    }
  }

  // LOGOUT
  function logout() {
    localStorage.removeItem("loggedIn");
    document.getElementById("loginPage").style.display = "block";
    document.getElementById("dashboard").style.display = "none";
  }

  // DEPOSIT
  function deposit() {
    balance += 100;
    showBalance();
  }

  // WITHDRAW
  function withdraw() {
    if (balance >= 100) {
      balance -= 100;
      showBalance();
    } else {
      alert("Not enough balance");
    }
  }

  // CALCULATOR
  function calc() {
    let a = document.getElementById("amount").value;

    if (!a || a <= 0) {
      document.getElementById("result").innerText = "Enter valid amount";
      return;
    }

    let profit = Number(a) * 0.2;

    document.getElementById("result").innerText =
      "Profit: " + profit;
  }
</script>

</body>
</html>
